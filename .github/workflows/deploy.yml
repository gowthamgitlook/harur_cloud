name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Analyze ─────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --reporter=compact

  # ─── Build Android APK (Release) ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Write local.properties
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> android/local.properties

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  # ─── Build & Deploy Web to Firebase Hosting ──────────────────────────────────
  deploy-web:
    name: Deploy Web
    needs: analyze
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --web-renderer html

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json \
            firebase deploy --project harur-cloud --only hosting
          rm /tmp/firebase-sa.json

      - name: Deploy Firestore security rules via REST API
        run: |
          pip install google-auth requests --quiet
          python3 << 'PYEOF'
          import json, requests, sys
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request

          SA = json.loads(r"""${{ secrets.FIREBASE_SERVICE_ACCOUNT }}""")
          PROJECT = 'harur-cloud'

          creds = service_account.Credentials.from_service_account_info(
              SA, scopes=['https://www.googleapis.com/auth/firebase'])
          creds.refresh(Request())
          hdrs = {'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'}
          base = f'https://firebaserules.googleapis.com/v1/projects/{PROJECT}'

          with open('firestore.rules') as f:
              rules = f.read()

          r1 = requests.post(f'{base}/rulesets', headers=hdrs,
              json={'source': {'files': [{'content': rules, 'name': 'firestore.rules'}]}})
          if not r1.ok:
              print(f'Create ruleset failed: {r1.status_code} {r1.text}', file=sys.stderr)
              sys.exit(1)
          ruleset = r1.json()['name']
          print(f'Ruleset created: {ruleset}')

          r2 = requests.patch(
              f'{base}/releases/cloud.firestore',
              headers=hdrs,
              json={
                  'release': {
                      'name': f'projects/{PROJECT}/releases/cloud.firestore',
                      'rulesetName': ruleset,
                  },
                  'updateMask': 'rulesetName',
              })
          if r2.ok:
              print('Firestore rules deployed successfully')
          else:
              print(f'Update release: {r2.status_code} {r2.text[:300]}')
              # Try creating release if it doesn't exist
              r3 = requests.post(f'{base}/releases', headers=hdrs,
                  json={'name': f'projects/{PROJECT}/releases/cloud.firestore',
                        'rulesetName': ruleset})
              if r3.ok:
                  print('Firestore rules release created successfully')
              else:
                  print(f'Create release failed: {r3.status_code} {r3.text}', file=sys.stderr)
                  sys.exit(1)
          PYEOF
